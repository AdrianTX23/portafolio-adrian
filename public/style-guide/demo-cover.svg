<svg width="960" height="720" viewBox="0 0 960 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d14" />
      <stop offset="100%" stop-color="#12101d" />
    </linearGradient>
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6d5bff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#6d5bff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c264e8" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#c264e8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blob3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4fd3ee" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#4fd3ee" stop-opacity="0" />
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60" />
    </filter>
  </defs>

  <rect width="960" height="720" fill="url(#bg)" />

  <g filter="url(#soft)">
    <circle cx="300" cy="230" r="240" fill="url(#blob1)" />
    <circle cx="700" cy="180" r="220" fill="url(#blob2)" />
    <circle cx="560" cy="520" r="260" fill="url(#blob3)" />
  </g>

  <g opacity="0.5" stroke="#ffffff" stroke-opacity="0.06">
    <line x1="0" y1="120" x2="960" y2="120" />
    <line x1="0" y1="240" x2="960" y2="240" />
    <line x1="0" y1="360" x2="960" y2="360" />
    <line x1="0" y1="480" x2="960" y2="480" />
    <line x1="0" y1="600" x2="960" y2="600" />
    <line x1="160" y1="0" x2="160" y2="720" />
    <line x1="320" y1="0" x2="320" y2="720" />
    <line x1="480" y1="0" x2="480" y2="720" />
    <line x1="640" y1="0" x2="640" y2="720" />
    <line x1="800" y1="0" x2="800" y2="720" />
  </g>
</svg>
